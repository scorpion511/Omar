        html, body {
            min-height: 100%;
            background-image: url('scorp2.png');
            background-size: cover;
            background-repeat: no-repeat;
            background-color: #24272b;
            color: white;
            text-align: center;
            margin: 0px;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
               h1 {
            font-size: 40px; /* Made slightly bigger for the glow */
            text-align: center;
            color: black; /* Text is black so the fire glow pops! */
            font-family: 'Arial Black', sans-serif;
            margin-top: 20px;
            
            /* Layered fire glow effect */
            text-shadow: 
                0px -2px 4px #fff,   
                0px -4px 10px #ff0,  
                0px -10px 20px #ff8000, 
                0px -18px 40px #f00; 
            
            /* Animation to make it flicker like real fire */
            animation: flicker 0.1s infinite alternate;
        }

        /* The fire movement logic */
        @keyframes flicker {
            0% {
                text-shadow: 0px -2px 4px #fff, 0px -4px 10px #ff0, 0px -10px 20px #ff8000, 0px -18px 40px #f00;
            }
            100% {
                text-shadow: 0px -1px 3px #fff, 0px -2px 8px #ff0, 0px -8px 18px #ff8000, 0px -15px 35px #f00;
                transform: translateY(-1px);
            }
            }
        a {
            display: inline-block;
            text-decoration: none;
            margin: 10px;
        }
        a:hover {
            animation: shake 0.5s infinite;
        }
        @keyframes shake {
            0% { transform: translateX(0); }
            20% { transform: translateX(-5px); }
            40% { transform: translateX(5px); }
            60% { transform: translateX(-5px); }
            80% { transform: translateX(5px); }
            100% { transform: translateX(0); }
        }
        #clock { float: right; margin-right: 2.25%; font-weight: bold; font-size: 28px; color: white; }
        #date { float: left; margin-left: 1.25%; font-weight: bold; font-size: 28px; color: white; }

        0px 0px 10px #ff0, 
        0px 0px 20px #ff8000, 
        0px 0px 30px #f00; 
}

        <script>
        function showdate() {
            var dt = new Date();
            var Hour = dt.getHours();
            var Minute = dt.getMinutes();
            var Day = dt.getDate();
            var Month = dt.getMonth() + 1;
            var Year = dt.getFullYear();

            if (Minute < 10) { Minute = "0" + Minute; }

            // 12-hour format logic
            var prepand = (Hour >= 12) ? " PM" : " AM";
            Hour = Hour % 12;
            Hour = Hour ? Hour : 12; 

            document.getElementById("date").innerHTML = (Day + "/" + Month + "/" + Year);
            document.getElementById("clock").innerHTML = (Hour + ":" + Minute + prepand);
        }
        setInterval(showdate, 1000);
