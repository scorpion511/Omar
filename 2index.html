<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SCORP HACK ALL VERSIONS - PS4</title>
    <style>
        html, body {
            min-height: 100%;
            background-image: url('scorpjif.gif');
            background-size: cover;
            background-repeat: no-repeat;
            background-color: #24272b;
            color: white;
            text-align: center;
            margin: 0px;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        h1 {
            font-size: 35px;
            text-align: center;
            color: yellow;
            text-shadow: 0.1em 0.1em 0.2em black;
            margin-top: 20px;
        }
        a {
            display: inline-block;
            text-decoration: none;
            margin: 10px;
        }
        a:hover {
            animation: shake 0.5s infinite;
        }
        @keyframes shake {
            0% { transform: translateX(0); }
            20% { transform: translateX(-5px); }
            40% { transform: translateX(5px); }
            60% { transform: translateX(-5px); }
            80% { transform: translateX(5px); }
            100% { transform: translateX(0); }
        }
        #clock { float: right; margin-right: 2.25%; font-weight: bold; font-size: 28px; color: white; }
        #date { float: left; margin-left: 1.25%; font-weight: bold; font-size: 28px; color: white; }
        #msgs { color: yellow; font-size: 25px; font-weight: bold; margin-top: 20px; height: 40px; }
    </style>
    <script>
        function showdate() {
            var dt = new Date();
            var Hour = dt.getHours();
            var Minute = dt.getMinutes();
            var Day = dt.getDate();
            var Month = dt.getMonth() + 1;
            var Year = dt.getFullYear();
            if (Minute < 10) { Minute = "0" + Minute; }
            if (Hour < 10) { Hour = "0" + Hour; }
            document.getElementById("date").innerHTML = (Day + "/" + Month + "/" + Year);
            document.getElementById("clock").innerHTML = (Hour + ":" + Minute);
        }
        setInterval(showdate, 1000);

        // Navigation Functions
        function allhost505() { document.getElementById('all').style.display = "none"; document.getElementById('host505').style.display = "block"; }
        function allhost672() { document.getElementById('all').style.display = "none"; document.getElementById('host672').style.display = "block"; }
        function allhost900c() { document.getElementById('all').style.display = "none"; document.getElementById('host900c').style.display = "block"; }
        function allgoldhen() { document.getElementById('all').style.display = "none"; document.getElementById('goldhen').style.display = "block"; }
        function alltrainer() { document.getElementById('all').style.display = "none"; document.getElementById('trainer').style.display = "block"; }
    </script>
</head>

    <span id="date"></span>

    <br><br>
    <h1>SCORP HACK ALL VERSIONS</h1>
