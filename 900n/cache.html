<!DOCTYPE html>
<html manifest="Cache.manifest">
<head>
    <meta charset="UTF-8">
    <title>SCORPION HACK - SMILE Dareen & Omar</title>
    <style>
        /* Main Page Layout & Full-Screen Background */
        html, body {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100%;
            background-image: url("../scorp2.png");
            background-size: cover;
            background-position: center center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            background-color: #24272b;
            color: white;
            text-align: center;
            overflow: hidden;
            font-family: 'Arial Black', sans-serif;
        }

        /* Fire Glowing Style for Progress & Credits */
        #progress, .fire-text {
            color: black;
            font-weight: 900;
            text-shadow: 
                0px -1px 2px #fff,  
                0px -2px 5px #ff0,  
                0px -5px 10px #ff8000, 
                0px -8px 20px #f00;
            animation: flicker 0.1s infinite alternate;
        }

        /* Smaller text for the "Special Thanks" label */
        .credits-label {
            color: white;
            font-size: 25px;
            margin-top: 50px;
            text-shadow: 2px 2px 4px black;
        }

        /* Fire flickering animation */
        @keyframes flicker {
            0% { transform: translateY(0px); }
            100% { transform: translateY(-1px); }
        }
    </style>
</head>
<body>
    <script>
        history.replaceState(null,null,'index.html');
        var histlength=history.length;
        history.go(-histlength);

        function DLProgress(e){
            var Percent = (Math.round(e.loaded / e.total * 100));
            setTimeout(function(){
                document.getElementById("progress").innerHTML = "Installing Offline Cache: " + Percent + "% <br> SMILE Dareen & Omar";
            }, 500);
        }

        function DisplayCacheProgress(){
            setTimeout(function(){
                document.getElementById("progress").innerHTML = "Cache Installed Successfully ✔";
            }, 1500);
            setTimeout(function(){
                document.getElementById("progress").innerHTML = "Now Close And Re-Open Your Browser ..";
            }, 3500);
        }

        window.applicationCache.addEventListener("progress", DLProgress, false);
        window.applicationCache.oncached = function(e){ DisplayCacheProgress(); };
        window.applicationCache.onupdateready = function(e){ DisplayCacheProgress(); };
    </script>

    <div id="container" style="margin-top: 15vh;">
        <!-- Glowing Progress Bar -->
        <h1 id="progress" style="font-size: 35px;">
            SCORPION HACK Initializing Cache... <br> SMILE Dareen & Omar
        </h1>

        <!-- Glowing Credits -->
        <div class="credits-label">
            SMILE Special Thanks to: <br>
            <span class="fire-text" style="font-size: 45px;">Dareen & Omar & Jojo</span>
        </div>
    </div>

</body>
</html>
