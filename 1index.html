<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WELCOME TO SCORP HACK - Dareen & Omar</title>
    <style>
        html, body {
            min-height: 100%;
            background-image: url('scorpjif.gif');
            background-size: cover;
            background-repeat: no-repeat;
            background-color: #24272b;
            color: white;
            text-align: center;
            margin: 0px;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

               h1 {
    font-size: 35px;
    text-align: center;
    /* Black text makes the fire glow look 10x brighter */
    color: black; 
    font-family: 'Arial Black', sans-serif;
    display: block;
    margin-top: 20px;

    /* Deep Fire Effect */
    text-shadow: 
        0px -2px 4px #fff,   /* White hot core */
        0px -4px 10px #ff0,  /* Yellow flame */
        0px -10px 20px #ff8000, /* Orange body */
        0px -18px 40px #f00; /* Red outer glow */
    
    /* Fast fire flicker + your original shake */
    animation: flicker 0.1s infinite alternate, shake 0.5s infinite;
}

/* This makes the fire "dance" */
@keyframes flicker {
    0% { 
        text-shadow: 0px -2px 4px #fff, 0px -4px 10px #ff0, 0px -10px 20px #ff8000, 0px -18px 40px #f00; 
    }
    100% { 
        text-shadow: 0px -1px 3px #fff, 0px -2px 8px #ff0, 0px -8px 18px #ff8000, 0px -15px 35px #f00; 
        transform: translateY(-1px); 
    }
        }
        @keyframes shake {
            0% { transform: translateX(0); }
            20% { transform: translateX(-3px); }
            40% { transform: translateX(3px); }
            60% { transform: translateX(-3px); }
            80% { transform: translateX(3px); }
            100% { transform: translateX(0); }
        }

        a {
            display: inline-block;
            text-decoration: none;
            margin: 10px;
        }

        a:hover {
            animation: shake 0.5s infinite;
        }

        #clock { float: right; margin-right: 2.25%; font-weight: bold; font-size: 28px; color: white; }
        #date { float: left; margin-left: 1.25%; font-weight: bold; font-size: 28px; color: white; }
        #msgs { color: yellow; font-size: 20px; font-weight: bold; display: block; height: 30px; margin-top: 10px; }
    </style>
    <script>
        function showdate() {
            var dt = new Date();
            var Hour = dt.getHours();
            var Minute = dt.getMinutes();
            var Day = dt.getDate();
            var Month = dt.getMonth() + 1;
            var Year = dt.getFullYear();
            var prepand = (Hour >= 12) ? " PM" : " AM";
            Hour = Hour % 12;
            Hour = Hour ? Hour : 12;
            if (Minute < 10) { Minute = "0" + Minute; }
            document.getElementById("date").innerHTML = (Day + "/" + Month + "/" + Year);
            document.getElementById("clock").innerHTML = (Hour + ":" + Minute + prepand);
        }
        setInterval(showdate, 1000);
    </script>
</head>
<body onload="showdate()">
    <div id="container">
        <span id="date"></span>
        <span id="clock"></span>
        <br><br>
        <h1>WELCOME TO SCORP HACK - Dareen & Omar</h1>
        
        <!-- Status Message Area -->
        <div id="msgs">Welcome to Scorpion Hack</div>

        <!-- Fixed Local Links -->
        <a href="ps3/auto490/index.html" onMouseOver="document.getElementById('msgs').innerHTML='SCORPION page device ps3'"><img src="FIRMWAREPS3.png" style="width: 400px;"></a>
        <a href="2index.html" onMouseOver="document.getElementById('msgs').innerHTML='SCORPION page device ps4'"><img src="FIRMWAREPS4.png" style="width: 400px;"></a>
        <a href="ps5/index.html" onMouseOver="document.getElementById('msgs').innerHTML='SCORPION page device ps5'"><img src="FIRMWAREPS5.png" style="width: 400px;"></a>
        
        <br><br>
        <a href="https://scorpgame-ar.site/" onMouseOver="document.getElementById('msgs').innerHTML='A set of tools used PlayStation devices'"><img src="logo.png" style="width: 250px;"></a>
        <a href="https://wolfgame-ar.site/" onMouseOver="document.getElementById('msgs').innerHTML='A collection of themes for the PS4 device'"</a>
    </div>
</body>
</html>
