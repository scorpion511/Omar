.credit-fire {
    font-family: 'Arial Black', sans-serif;
    font-size: 60px; /* Made much bigger as requested */
    font-weight: bold;
    color: black;
    display: block;
    clear: both;
    text-align: center;
    margin: 60px auto; /* More space for the larger text */
    width: 100%;
    
    /* Stronger fire effect for bigger text */
    text-shadow: 
        0px -2px 4px #fff,  
        0px -4px 10px #ff0,  
        0px -10px 20px #ff8000, 
        0px -18px 40px #f00;   

    /* Animation: fire flicker and the smooth slow fade */
    animation: fire-flicker 0.1s infinite alternate, slow-fade 4s ease-in-out infinite;
}

/* Fire flickering movement */
@keyframes fire-flicker {
    0% { transform: translateY(0px); }
    100% { 
        transform: translateY(-2px);
        text-shadow: 0px -1px 3px #fff, 0px -2px 8px #ff0, 0px -8px 18px #ff8000, 0px -15px 35px #f00;
    }
}

/* Smooth Fading Animation */
@keyframes slow-fade {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; } 
}

/* General H1 styling to match */
h1 {
    font-size: 50px;
    color: yellow;
    text-shadow: 2px 2px 4px black;
}

     <script>
  function showdate() {
    var dt = new Date();
    var Hour = dt.getHours();
    var Minute = dt.getMinutes();
    var Day = dt.getDate();
    var Month = dt.getMonth() + 1;
    var Year = dt.getFullYear();

    // 12-hour format with AM/PM
    var prepand = (Hour >= 12) ? " PM" : " AM";
    Hour = Hour % 12;
    Hour = Hour ? Hour : 12;

    if (Minute < 10) { Minute = "0" + Minute; }

    document.getElementById("date").innerHTML = (Day + "/" + Month + "/" + Year);
    document.getElementById("clock").innerHTML = (Hour + ":" + Minute + prepand);
  }

  // Run the clock
  showdate();
  setInterval(showdate, 1000);
</script>
